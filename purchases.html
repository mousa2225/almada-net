<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المشتريات — المدى نت</title>
<link rel="stylesheet" href="theme.css">
<style>
.cat-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600}
.action-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <header class="topbar">
    <h1 class="tb-title">المشتريات <span class="breadcrumb">/ سجل المصاريف</span></h1>
    <input type="search" id="searchInput" class="search-input" placeholder="🔍 ابحث...">
    <button class="btn btn-sm" id="exportBtn">📤 تصدير CSV</button>
    <a href="finances.html" class="btn btn-primary btn-sm">＋ تسجيل مصروف</a>
  </header>
  <div class="content">
    <div class="kpi-grid">
      <div class="kpi kpi-blue"><div class="kpi-label"><span class="kpi-icon">▤</span> أجهزة</div><div class="kpi-value" id="k-dev" style="font-size:20px">—</div><div class="kpi-sub" id="k-dev-c">—</div></div>
      <div class="kpi kpi-purple"><div class="kpi-label"><span class="kpi-icon">🔧</span> صيانة</div><div class="kpi-value" id="k-maint" style="font-size:20px">—</div><div class="kpi-sub" id="k-maint-c">—</div></div>
      <div class="kpi kpi-yellow"><div class="kpi-label"><span class="kpi-icon">⚡</span> فواتير</div><div class="kpi-value" id="k-util" style="font-size:20px">—</div><div class="kpi-sub" id="k-util-c">—</div></div>
      <div class="kpi kpi-pink"><div class="kpi-label"><span class="kpi-icon">📦</span> أخرى</div><div class="kpi-value" id="k-misc" style="font-size:20px">—</div><div class="kpi-sub" id="k-misc-c">—</div></div>
    </div>

    <div class="panel fade-up" style="animation-delay:.1s">
      <div class="panel-header">
        <span class="panel-icon">🛒</span>
        <div class="panel-title">جميع المصاريف</div>
        <span id="recordCount" class="badge badge-gray">0</span>
      </div>
      <div class="filter-bar">
        <button class="chip active" data-cat="all">الكل</button>
        <button class="chip" data-cat="device">▤ أجهزة</button>
        <button class="chip" data-cat="maintenance">🔧 صيانة</button>
        <button class="chip" data-cat="electricity">⚡ كهرباء</button>
        <button class="chip" data-cat="rent">🏢 إيجار</button>
        <button class="chip" data-cat="salary">👥 رواتب</button>
        <button class="chip" data-cat="internet">📡 إنترنت</button>
        <button class="chip" data-cat="misc">📦 متفرقات</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>الوصف</th>
            <th>الفئة</th>
            <th>المبلغ</th>
            <th>التاريخ</th>
            <th>الجهاز</th>
            <th>الدفع</th>
          </tr></thead>
          <tbody id="tbBody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-3)">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <div class="page-info" id="pageInfo">0</div>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>
</main>

<script type="module">
import {
  db, collection, onSnapshot, query, orderBy,
  watchSettings, fmt, getCurrencySymbol, convertFromBase,
  esc, renderSidebar, toast
} from "./app.js";

document.getElementById("sidebar").innerHTML = renderSidebar("purchases");
watchSettings(s=>{
  const sn=document.getElementById("sbNetName");
  if(sn)sn.textContent=s.netName;
});

let allTx=[], filtered=[], curCat="all", srch="", curPage=1;
const PAGE_SIZE=15;

onSnapshot(query(collection(db,"transactions"),orderBy("date","desc")),snap=>{
  allTx=snap.docs.map(d=>({id:d.id,...d.data()})).filter(t=>t.txType==="expense");
  updateKPIs(); applyFilters();
});

function updateKPIs(){
  const cats={device:0,maintenance:0,electricity:0,rent:0,salary:0,internet:0,misc:0};
  const counts={device:0,maintenance:0,electricity:0,rent:0,salary:0,internet:0,misc:0};
  allTx.forEach(t=>{
    const c=t.category||"misc";
    if(cats[c]!==undefined){cats[c]+=(parseFloat(t.amount)||0);counts[c]++;}
    else{cats.misc+=(parseFloat(t.amount)||0);counts.misc++;}
  });
  document.getElementById("k-dev").textContent=fmt(cats.device);
  document.getElementById("k-dev-c").textContent=counts.device+" مشتريات";
  document.getElementById("k-maint").textContent=fmt(cats.maintenance);
  document.getElementById("k-maint-c").textContent=counts.maintenance+" عملية";
  document.getElementById("k-util").textContent=fmt(cats.electricity+cats.rent+cats.internet);
  document.getElementById("k-util-c").textContent=(counts.electricity+counts.rent+counts.internet)+" فاتورة";
  document.getElementById("k-misc").textContent=fmt(cats.misc+cats.salary);
  document.getElementById("k-misc-c").textContent=(counts.misc+counts.salary)+" بند";
}

function applyFilters(){
  let data=[...allTx];
  if(curCat!=="all")data=data.filter(t=>t.category===curCat);
  if(srch){
    const q=srch.toLowerCase();
    data=data.filter(t=>(t.description||"").toLowerCase().includes(q)||(t.linkedDevice||"").toLowerCase().includes(q));
  }
  filtered=data; curPage=1; renderTable();
}

function renderTable(){
  const total=filtered.length;
  const start=(curPage-1)*PAGE_SIZE;
  const slice=filtered.slice(start,start+PAGE_SIZE);
  document.getElementById("recordCount").textContent=total+" مصروف";
  document.getElementById("pageInfo").textContent=total?`${start+1}–${Math.min(start+PAGE_SIZE,total)} من ${total}`:"0";
  if(!total){
    document.getElementById("tbBody").innerHTML=`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-3)"><div style="font-size:36px;margin-bottom:10px;opacity:.4">🛒</div>لا توجد مصاريف — <a href="finances.html" style="color:var(--accent)">سجّل مصروف</a></td></tr>`;
    document.getElementById("pageBtns").innerHTML="";
    return;
  }
  const catColors={device:["#06b6d4","var(--accent-soft)"],maintenance:["#a855f7","rgba(168,85,247,.1)"],electricity:["#f59e0b","var(--warn-soft)"],rent:["#ec4899","rgba(236,72,153,.1)"],salary:["#a855f7","rgba(168,85,247,.1)"],internet:["#10b981","var(--success-soft)"],misc:["#64748b","rgba(100,116,139,.1)"]};
  const catNames={device:"أجهزة",maintenance:"صيانة",electricity:"كهرباء",rent:"إيجار",salary:"رواتب",internet:"إنترنت",misc:"متفرقات"};
  const catIcons={device:"▤",maintenance:"🔧",electricity:"⚡",rent:"🏢",salary:"👥",internet:"📡",misc:"📦"};
  const payNames={cash:"نقدي",transfer:"تحويل",card:"بطاقة",other:"أخرى"};
  document.getElementById("tbBody").innerHTML=slice.map(t=>{
    const cc=catColors[t.category]||catColors.misc;
    return `<tr>
      <td><div class="fw-600">${esc(t.description||"—")}</div>${t.notes?`<div class="text-xs text-3">${esc(t.notes)}</div>`:""}</td>
      <td><span class="cat-pill" style="color:${cc[0]};background:${cc[1]}">${catIcons[t.category]||"📋"} ${catNames[t.category]||t.category||"—"}</span></td>
      <td><span class="text-mono fw-700 text-danger">−${fmt(t.amount)}</span></td>
      <td class="text-3 text-mono text-sm">${t.date||"—"}</td>
      <td class="text-2 text-sm">${esc(t.linkedDevice||"—")}</td>
      <td class="text-2 text-sm">${payNames[t.paymentMethod]||"—"}</td>
    </tr>`;
  }).join("");
  renderPagination(total);
}

function renderPagination(total){
  const pages=Math.ceil(total/PAGE_SIZE);
  const wrap=document.getElementById("pageBtns");
  if(pages<=1){wrap.innerHTML="";return;}
  let h=`<button class="page-btn" onclick="goPage(${curPage-1})" ${curPage===1?"disabled":""}>‹</button>`;
  const start=Math.max(1,curPage-3);
  const end=Math.min(pages,start+6);
  for(let i=start;i<=end;i++){h+=`<button class="page-btn ${i===curPage?'active':''}" onclick="goPage(${i})">${i}</button>`;}
  h+=`<button class="page-btn" onclick="goPage(${curPage+1})" ${curPage===pages?"disabled":""}>›</button>`;
  wrap.innerHTML=h;
}
window.goPage=p=>{curPage=p;renderTable();};

document.querySelectorAll(".chip[data-cat]").forEach(c=>c.addEventListener("click",()=>{
  document.querySelectorAll(".chip[data-cat]").forEach(x=>x.classList.remove("active"));
  c.classList.add("active");
  curCat=c.dataset.cat;
  applyFilters();
}));

let st;
document.getElementById("searchInput").addEventListener("input",e=>{
  clearTimeout(st);
  st=setTimeout(()=>{srch=e.target.value;applyFilters();},250);
});

document.getElementById("exportBtn").onclick=()=>{
  const catNames={device:"أجهزة",maintenance:"صيانة",electricity:"كهرباء",rent:"إيجار",salary:"رواتب",internet:"إنترنت",misc:"متفرقات"};
  const headers=["الوصف","الفئة","المبلغ","التاريخ","الجهاز","الدفع"];
  const rows=filtered.map(t=>[
    t.description, catNames[t.category]||t.category,
    t.amount?convertFromBase(t.amount).toFixed(2):0, t.date,
    t.linkedDevice||"", t.paymentMethod||""
  ].map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(","));
  const csv="\uFEFF"+headers.join(",")+"\n"+rows.join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="مشتريات-"+new Date().toISOString().split("T")[0]+".csv";
  a.click();
  toast(`تم تصدير ${filtered.length} مصروف`,"info");
};
</script>
</body>
</html>
