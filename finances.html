<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإدارة المالية — المدى نت</title>
<link rel="stylesheet" href="theme.css">
<style>
.tx-amount-cell{font-family:var(--mono);font-weight:700;font-size:13px;white-space:nowrap}
.tx-amount-cell.income{color:var(--success)}
.tx-amount-cell.expense{color:var(--danger)}
.cat-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600}
.action-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.action-btn.danger:hover{border-color:var(--danger);color:var(--danger)}
.row-actions{display:flex;gap:5px}
.tx-type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:14px}
.tx-type-toggle button{background:none;border:none;padding:9px;font-family:inherit;font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;border-radius:6px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.tx-type-toggle button.active{background:var(--surface);color:var(--text);box-shadow:var(--sh-sm)}
.tx-type-toggle button.active.expense{color:var(--danger)}
.tx-type-toggle button.active.income{color:var(--success)}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <header class="topbar">
    <h1 class="tb-title">الإدارة المالية <span class="breadcrumb">/ المعاملات</span></h1>
    <input type="search" id="searchInput" class="search-input" placeholder="🔍 ابحث...">
    <button class="btn btn-sm" id="exportBtn">📤 تصدير</button>
    <button class="btn btn-success btn-sm" onclick="openAdd('income')">＋ إيراد</button>
    <button class="btn btn-danger btn-sm" onclick="openAdd('expense')">＋ مصروف</button>
  </header>
  <div class="content">
    <div class="kpi-grid">
      <div class="kpi kpi-green"><div class="kpi-label"><span class="kpi-icon">↓</span> الإيرادات</div><div class="kpi-value" id="k-income" style="font-size:22px">—</div><div class="kpi-sub" id="k-income-sub">—</div></div>
      <div class="kpi kpi-red"><div class="kpi-label"><span class="kpi-icon">↑</span> المصاريف</div><div class="kpi-value" id="k-expense" style="font-size:22px">—</div><div class="kpi-sub" id="k-expense-sub">—</div></div>
      <div class="kpi kpi-yellow"><div class="kpi-label"><span class="kpi-icon">◆</span> صافي الربح</div><div class="kpi-value" id="k-net" style="font-size:22px">—</div><div class="kpi-sub" id="k-net-sub">—</div></div>
      <div class="kpi kpi-purple"><div class="kpi-label"><span class="kpi-icon">▤</span> قيمة الأجهزة</div><div class="kpi-value" id="k-devices" style="font-size:22px">—</div><div class="kpi-sub">من الأجهزة</div></div>
    </div>

    <div class="panel fade-up" style="animation-delay:.1s">
      <div class="panel-header">
        <span class="panel-icon">◆</span>
        <div class="panel-title">جميع المعاملات</div>
        <span id="recordCount" class="badge badge-gray">0</span>
      </div>
      <div class="filter-bar">
        <button class="chip active" data-tx="all">الكل</button>
        <button class="chip" data-tx="income">↓ إيرادات</button>
        <button class="chip" data-tx="expense">↑ مصاريف</button>
        <div style="width:1px;height:18px;background:var(--border);margin:0 4px"></div>
        <button class="chip" data-cat="all">كل الفئات</button>
        <button class="chip" data-cat="device">▤ أجهزة</button>
        <button class="chip" data-cat="maintenance">🔧 صيانة</button>
        <button class="chip" data-cat="electricity">⚡ كهرباء</button>
        <button class="chip" data-cat="rent">🏢 إيجار</button>
        <button class="chip" data-cat="salary">👥 رواتب</button>
        <button class="chip" data-cat="internet">📡 اشتراك</button>
        <button class="chip" data-cat="misc">📦 متفرقات</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>الوصف</th>
            <th>النوع</th>
            <th>الفئة</th>
            <th>المبلغ</th>
            <th>التاريخ</th>
            <th>طريقة الدفع</th>
            <th style="width:120px">إجراءات</th>
          </tr></thead>
          <tbody id="tbBody">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-3)">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <div class="page-info" id="pageInfo">0 معاملة</div>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="txModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="txIcon">◆</div>
      <div class="modal-title" id="txTitle">معاملة جديدة</div>
      <button class="modal-close" onclick="closeM('txModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="tx-type-toggle">
        <button id="ttBtnInc" class="income" onclick="setTxType('income')"><span>↓</span> إيراد</button>
        <button id="ttBtnExp" class="expense active" onclick="setTxType('expense')"><span>↑</span> مصروف</button>
      </div>
      <div class="fg">
        <label>الوصف <span class="req">*</span></label>
        <input type="text" id="f-desc" placeholder="مثال: شراء راوتر Mikrotik">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>الفئة</label>
          <select id="f-cat">
            <option value="device">▤ شراء أجهزة</option>
            <option value="maintenance">🔧 صيانة</option>
            <option value="electricity">⚡ كهرباء</option>
            <option value="rent">🏢 إيجار</option>
            <option value="salary">👥 رواتب</option>
            <option value="internet">📡 اشتراك إنترنت</option>
            <option value="misc">📦 متفرقات</option>
          </select>
        </div>
        <div class="fg">
          <label>المبلغ <span class="req">*</span> <span id="curHint" class="hint" style="font-size:10px"></span></label>
          <input type="number" id="f-amount" placeholder="0" min="0" step="0.01">
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>التاريخ <span class="req">*</span></label>
          <input type="date" id="f-date">
        </div>
        <div class="fg">
          <label>طريقة الدفع</label>
          <select id="f-payment">
            <option value="cash">💵 نقدي</option>
            <option value="transfer">🏦 تحويل بنكي</option>
            <option value="card">💳 بطاقة</option>
            <option value="other">أخرى</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>الجهاز المرتبط (اختياري)</label>
        <input type="text" id="f-device" placeholder="اسم الجهاز">
      </div>
      <div class="fg">
        <label>ملاحظات</label>
        <textarea id="f-notes" placeholder="ملاحظات إضافية..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeM('txModal')">إلغاء</button>
      <button class="btn btn-primary" id="txSaveBtn" onclick="saveTx()">💾 حفظ</button>
    </div>
  </div>
</div>

<script type="module">
import {
  db, collection, addDoc, doc, updateDoc, deleteDoc,
  onSnapshot, serverTimestamp, query, orderBy,
  watchSettings, fmt, getCurrencySymbol, convertToBase, convertFromBase,
  esc, renderSidebar, toast, openModal, closeModal, confirmDialog
} from "./app.js";

document.getElementById("sidebar").innerHTML = renderSidebar("finances");

let allTx=[], allDevices=[], filtered=[];
let txTypeFilter="all", catFilter="all", srch="";
let curPage=1, txType="expense", editingId=null;
const PAGE_SIZE=15;

watchSettings(s=>{
  document.getElementById("curHint").textContent=`(${getCurrencySymbol()})`;
  applyFilters();
});

onSnapshot(query(collection(db,"transactions"),orderBy("date","desc")),snap=>{
  allTx=snap.docs.map(d=>({id:d.id,...d.data()}));
  updateKPIs(); applyFilters();
});

onSnapshot(collection(db,"devices"),snap=>{
  allDevices=snap.docs.map(d=>({id:d.id,...d.data()}));
  updateKPIs();
});

function updateKPIs(){
  const inc=allTx.filter(t=>t.txType==="income").reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const exp=allTx.filter(t=>t.txType==="expense").reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const devCost=allDevices.reduce((s,d)=>s+(parseFloat(d.cost)||0),0);
  const net=inc-exp-devCost;
  document.getElementById("k-income").textContent=fmt(inc);
  document.getElementById("k-income-sub").textContent=allTx.filter(t=>t.txType==="income").length+" معاملة";
  document.getElementById("k-expense").textContent=fmt(exp);
  document.getElementById("k-expense-sub").textContent=allTx.filter(t=>t.txType==="expense").length+" معاملة";
  document.getElementById("k-net").textContent=(net>=0?"":"−")+fmt(Math.abs(net));
  document.getElementById("k-net-sub").textContent=net>=0?"✓ في الربح":"في الخسارة";
  document.getElementById("k-net-sub").className="kpi-sub "+(net>=0?"text-success":"text-danger");
  document.getElementById("k-devices").textContent=fmt(devCost);
}

function applyFilters(){
  let data=[...allTx];
  if(txTypeFilter!=="all")data=data.filter(t=>t.txType===txTypeFilter);
  if(catFilter!=="all")data=data.filter(t=>t.category===catFilter);
  if(srch){
    const q=srch.toLowerCase();
    data=data.filter(t=>(t.description||"").toLowerCase().includes(q)||(t.linkedDevice||"").toLowerCase().includes(q));
  }
  filtered=data; curPage=1; renderTable();
}

function renderTable(){
  const total=filtered.length;
  const start=(curPage-1)*PAGE_SIZE;
  const slice=filtered.slice(start,start+PAGE_SIZE);
  document.getElementById("recordCount").textContent=total+" معاملة";
  document.getElementById("pageInfo").textContent=total?`${start+1}–${Math.min(start+PAGE_SIZE,total)} من ${total}`:"0";
  if(!total){
    document.getElementById("tbBody").innerHTML=`<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-3)"><div style="font-size:36px;margin-bottom:10px;opacity:.4">◆</div>لا توجد معاملات</td></tr>`;
    document.getElementById("pageBtns").innerHTML="";
    return;
  }
  const catColors={device:["#06b6d4","var(--accent-soft)"],maintenance:["#a855f7","rgba(168,85,247,.1)"],electricity:["#f59e0b","var(--warn-soft)"],rent:["#ec4899","rgba(236,72,153,.1)"],salary:["#a855f7","rgba(168,85,247,.1)"],internet:["#10b981","var(--success-soft)"],misc:["#64748b","rgba(100,116,139,.1)"]};
  const catNames={device:"أجهزة",maintenance:"صيانة",electricity:"كهرباء",rent:"إيجار",salary:"رواتب",internet:"إنترنت",misc:"متفرقات"};
  const catIcons={device:"▤",maintenance:"🔧",electricity:"⚡",rent:"🏢",salary:"👥",internet:"📡",misc:"📦"};
  const payNames={cash:"نقدي",transfer:"تحويل",card:"بطاقة",other:"أخرى"};
  document.getElementById("tbBody").innerHTML=slice.map(t=>{
    const cc=catColors[t.category]||catColors.misc;
    const isInc=t.txType==="income";
    return `<tr>
      <td><div class="fw-600">${esc(t.description||"—")}</div>${t.linkedDevice?`<div class="text-xs text-3">↳ ${esc(t.linkedDevice)}</div>`:""}</td>
      <td><span class="badge ${isInc?'badge-green':'badge-red'}">${isInc?"↓ إيراد":"↑ مصروف"}</span></td>
      <td><span class="cat-pill" style="color:${cc[0]};background:${cc[1]}">${catIcons[t.category]||"📋"} ${catNames[t.category]||t.category||"—"}</span></td>
      <td><span class="tx-amount-cell ${isInc?'income':'expense'}">${isInc?"+":"−"}${fmt(t.amount)}</span></td>
      <td class="text-3 text-mono text-sm">${t.date||"—"}</td>
      <td class="text-2 text-sm">${payNames[t.paymentMethod]||"—"}</td>
      <td><div class="row-actions">
        <button class="action-btn" onclick="editTx('${t.id}')">✏️</button>
        <button class="action-btn danger" onclick="confirmDel('${t.id}','${esc(t.description||"")}')">🗑️</button>
      </div></td>
    </tr>`;
  }).join("");
  renderPagination(total);
}

function renderPagination(total){
  const pages=Math.ceil(total/PAGE_SIZE);
  const wrap=document.getElementById("pageBtns");
  if(pages<=1){wrap.innerHTML="";return;}
  let h=`<button class="page-btn" onclick="goPage(${curPage-1})" ${curPage===1?"disabled":""}>‹</button>`;
  const start=Math.max(1,curPage-3);
  const end=Math.min(pages,start+6);
  for(let i=start;i<=end;i++){h+=`<button class="page-btn ${i===curPage?'active':''}" onclick="goPage(${i})">${i}</button>`;}
  h+=`<button class="page-btn" onclick="goPage(${curPage+1})" ${curPage===pages?"disabled":""}>›</button>`;
  wrap.innerHTML=h;
}

window.goPage=p=>{curPage=p;renderTable();};

document.querySelectorAll(".chip[data-tx]").forEach(c=>c.addEventListener("click",()=>{
  document.querySelectorAll(".chip[data-tx]").forEach(x=>x.classList.remove("active"));
  c.classList.add("active");
  txTypeFilter=c.dataset.tx;
  applyFilters();
}));
document.querySelectorAll(".chip[data-cat]").forEach(c=>c.addEventListener("click",()=>{
  document.querySelectorAll(".chip[data-cat]").forEach(x=>x.classList.remove("active"));
  c.classList.add("active");
  catFilter=c.dataset.cat;
  applyFilters();
}));

let st;
document.getElementById("searchInput").addEventListener("input",e=>{
  clearTimeout(st);
  st=setTimeout(()=>{srch=e.target.value;applyFilters();},250);
});

window.openAdd=type=>{
  editingId=null;
  txType=type||"expense";
  setTxType(txType);
  document.getElementById("txTitle").textContent=type==="income"?"تسجيل إيراد":"تسجيل مصروف";
  document.getElementById("txIcon").textContent=type==="income"?"↓":"↑";
  ["f-desc","f-amount","f-device","f-notes"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-cat").value=type==="income"?"misc":"device";
  document.getElementById("f-payment").value="cash";
  document.getElementById("f-date").value=new Date().toISOString().split("T")[0];
  openModal("txModal");
  setTimeout(()=>document.getElementById("f-desc").focus(),100);
};

window.setTxType=t=>{
  txType=t;
  document.getElementById("ttBtnInc").classList.toggle("active",t==="income");
  document.getElementById("ttBtnExp").classList.toggle("active",t==="expense");
};

window.editTx=id=>{
  const t=allTx.find(x=>x.id===id);if(!t)return;
  editingId=id;
  txType=t.txType||"expense";
  setTxType(txType);
  document.getElementById("txTitle").textContent="تعديل: "+(t.description||"معاملة");
  document.getElementById("txIcon").textContent=txType==="income"?"↓":"↑";
  document.getElementById("f-desc").value=t.description||"";
  document.getElementById("f-cat").value=t.category||"misc";
  document.getElementById("f-amount").value=t.amount?convertFromBase(t.amount).toFixed(2):"";
  document.getElementById("f-date").value=t.date||"";
  document.getElementById("f-payment").value=t.paymentMethod||"cash";
  document.getElementById("f-device").value=t.linkedDevice||"";
  document.getElementById("f-notes").value=t.notes||"";
  openModal("txModal");
};

window.saveTx=async()=>{
  const desc=document.getElementById("f-desc").value.trim();
  const amtDisplay=parseFloat(document.getElementById("f-amount").value)||0;
  if(!desc){toast("الوصف مطلوب","error");return;}
  if(amtDisplay<=0){toast("المبلغ يجب أن يكون أكبر من صفر","error");return;}
  const payload={
    description:desc,
    txType:txType,
    category:document.getElementById("f-cat").value,
    amount:convertToBase(amtDisplay),
    date:document.getElementById("f-date").value,
    paymentMethod:document.getElementById("f-payment").value,
    linkedDevice:document.getElementById("f-device").value.trim(),
    notes:document.getElementById("f-notes").value.trim(),
  };
  try{
    if(editingId){
      await updateDoc(doc(db,"transactions",editingId),{...payload,updatedAt:serverTimestamp()});
      toast("تم التحديث ✓","success");
    } else {
      await addDoc(collection(db,"transactions"),{...payload,createdAt:serverTimestamp()});
      toast("تم الحفظ ✓","success");
    }
    closeModal("txModal");
  }catch(e){toast("خطأ: "+e.message,"error");}
};

window.confirmDel=async(id,desc)=>{
  const ok=await confirmDialog(`حذف "${desc}" نهائياً؟`,true);
  if(!ok)return;
  await deleteDoc(doc(db,"transactions",id));
  toast("تم الحذف ✓","success");
};

document.getElementById("exportBtn").onclick=()=>{
  const headers=["الوصف","النوع","الفئة","المبلغ","التاريخ","الدفع","الجهاز","ملاحظات"];
  const catNames={device:"أجهزة",maintenance:"صيانة",electricity:"كهرباء",rent:"إيجار",salary:"رواتب",internet:"إنترنت",misc:"متفرقات"};
  const rows=filtered.map(t=>[
    t.description,t.txType==="income"?"إيراد":"مصروف",catNames[t.category]||t.category,
    t.amount?convertFromBase(t.amount).toFixed(2):0,t.date,t.paymentMethod,t.linkedDevice||"",t.notes||""
  ].map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(","));
  const csv="\uFEFF"+headers.join(",")+"\n"+rows.join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="معاملات-"+new Date().toISOString().split("T")[0]+".csv";
  a.click();
  toast(`تصدير ${filtered.length} معاملة`,"info");
};

window.closeM=closeModal;
</script>
</body>
</html>
