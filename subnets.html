<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشبكات الفرعية — المدى نت</title>
<link rel="stylesheet" href="theme.css?v=5">
<style>
.sn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.sn-card{background:linear-gradient(135deg,var(--surface) 0%,rgba(13,20,36,.5) 100%);border:1px solid var(--border);border-radius:13px;padding:18px;position:relative;overflow:hidden;transition:all .25s;animation:fadeUp .4s ease both}
.sn-card:hover{border-color:var(--border-2);transform:translateY(-2px);box-shadow:var(--sh-md)}
.sn-card::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:var(--card-color,var(--accent))}
.sn-head{display:flex;align-items:flex-start;gap:11px;margin-bottom:14px}
.sn-icon{width:40px;height:40px;background:var(--card-color,var(--accent));opacity:.18;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.sn-info{flex:1;min-width:0}
.sn-name{font-size:15px;font-weight:700;margin-bottom:2px}
.sn-cidr{font-family:var(--mono);font-size:11px;color:var(--card-color,var(--accent));font-weight:600}
.sn-actions{display:flex;gap:4px}
.sn-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.sn-stat{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.sn-stat-label{font-size:10px;color:var(--text-3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.sn-stat-val{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--text)}
.sn-prog{margin-bottom:11px}
.sn-prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:11px}
.sn-prog-bar{height:6px;background:var(--surface-3);border-radius:4px;overflow:hidden}
.sn-prog-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.sn-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3);padding-top:11px;border-top:1px solid var(--border)}
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;padding:6px;background:var(--surface-2);border-radius:8px}
.color-pick{width:28px;height:28px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-pick:hover{transform:scale(1.1)}
.color-pick.selected{border-color:#fff;box-shadow:0 0 0 2px rgba(0,0,0,.5)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-3)}
.empty-state .icon{font-size:48px;opacity:.3;margin-bottom:14px}
</style>
<script>
(function(){
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme", t);
    try{localStorage.setItem("almada-theme", t);}catch(e){}
    var btn = document.getElementById("themeToggle");
    if(btn) btn.innerHTML = t === "dark" ? "☀️" : "🌙";
  }
  function getStored(){
    try{return localStorage.getItem("almada-theme") || "dark";}catch(e){return "dark";}
  }
  function loadCustomColors(){
    try{
      var custom = JSON.parse(localStorage.getItem("almada-custom-colors") || "{}");
      Object.entries(custom).forEach(function(entry){
        document.documentElement.style.setProperty(entry[0], entry[1]);
      });
    }catch(e){}
  }
  applyTheme(getStored());
  loadCustomColors();
  window.toggleTheme = function(){
    var cur = getStored();
    applyTheme(cur === "dark" ? "light" : "dark");
    setTimeout(loadCustomColors, 50);
  };
  document.addEventListener("DOMContentLoaded", function(){
    applyTheme(getStored());
    loadCustomColors();
  });
})();
</script>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <header class="topbar">
    <h1 class="tb-title">الشبكات الفرعية <span class="breadcrumb">/ Subnets</span></h1>
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="تبديل السمة">☀️</button>
    <button class="btn btn-primary btn-sm" onclick="openAdd()">＋ إضافة شبكة</button>
  </header>
  <div class="content">
    <div class="kpi-grid">
      <div class="kpi kpi-blue"><div class="kpi-label"><span class="kpi-icon">▦</span> الشبكات</div><div class="kpi-value" id="k-total">0</div><div class="kpi-sub">subnet نشط</div></div>
      <div class="kpi kpi-green"><div class="kpi-label"><span class="kpi-icon">●</span> IPs مستخدمة</div><div class="kpi-value" id="k-used">0</div><div class="kpi-sub" id="k-used-sub">—</div></div>
      <div class="kpi kpi-yellow"><div class="kpi-label"><span class="kpi-icon">◯</span> IPs المتاحة</div><div class="kpi-value" id="k-free">0</div><div class="kpi-sub">للأجهزة الجديدة</div></div>
      <div class="kpi kpi-red"><div class="kpi-label"><span class="kpi-icon">⚠</span> شبكات ممتلئة</div><div class="kpi-value" id="k-full">0</div><div class="kpi-sub">أكثر من 85%</div></div>
    </div>

    <div class="panel fade-up" style="animation-delay:.1s">
      <div class="panel-header">
        <span class="panel-icon">▦</span>
        <div class="panel-title">جميع الشبكات الفرعية</div>
      </div>
      <div style="padding:18px">
        <div id="snGrid" class="sn-grid">
          <div class="empty-state">جاري التحميل...</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="snModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-icon">▦</div>
      <div class="modal-title" id="snTitle">إضافة شبكة فرعية</div>
      <button class="modal-close" onclick="closeM('snModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>اسم الشبكة <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="مثال: Subnet-North">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>عنوان الشبكة (CIDR)</label>
          <input type="text" id="f-cidr" class="input-mono" placeholder="192.168.1.0/24">
        </div>
        <div class="fg">
          <label>البوابة (Gateway)</label>
          <input type="text" id="f-gateway" class="input-mono" placeholder="192.168.1.1">
        </div>
      </div>
      <div class="fg">
        <label>DNS</label>
        <input type="text" id="f-dns" class="input-mono" placeholder="8.8.8.8, 8.8.4.4">
      </div>
      <div class="fg">
        <label>الوصف</label>
        <textarea id="f-desc" placeholder="ملاحظات..." style="min-height:60px"></textarea>
      </div>
      <div class="fg">
        <label>اللون المميز</label>
        <div class="color-grid" id="colorGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeM('snModal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveSubnet()">💾 حفظ</button>
    </div>
  </div>
</div>

<script type="module">
import {
  db, collection, addDoc, doc, updateDoc, deleteDoc,
  onSnapshot, serverTimestamp, esc, renderSidebar, toast, openModal, closeModal, confirmDialog,
  watchSettings
} from "./app.js?v=5";

document.getElementById("sidebar").innerHTML = renderSidebar("subnets");
watchSettings(s=>{
  const sn=document.getElementById("sbNetName");
  if(sn)sn.textContent=s.netName;
});

let subnets=[], devices=[];
let editingId=null, selColor="#06b6d4";

const COLORS=["#06b6d4","#3b82f6","#8b5cf6","#a855f7","#ec4899","#f43f5e","#f59e0b","#eab308","#10b981","#14b8a6","#06b6d4","#0ea5e9","#6366f1","#84cc16","#f97316","#ef4444"];

const grid=document.getElementById("colorGrid");
COLORS.forEach(c=>{
  const d=document.createElement("div");
  d.className="color-pick";
  d.style.background=c;
  d.onclick=()=>{document.querySelectorAll(".color-pick").forEach(x=>x.classList.remove("selected"));d.classList.add("selected");selColor=c;};
  grid.appendChild(d);
});
grid.firstElementChild.classList.add("selected");

onSnapshot(collection(db,"subnets"),snap=>{
  subnets=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});
onSnapshot(collection(db,"devices"),snap=>{
  devices=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

function cidrCount(cidr){
  if(!cidr||!cidr.includes("/"))return 0;
  return Math.min(Math.pow(2,32-parseInt(cidr.split("/")[1])),256);
}

function render(){
  // KPIs
  document.getElementById("k-total").textContent=subnets.length;
  let totalUsed=0, totalCap=0, fullCount=0;
  subnets.forEach(s=>{
    const used=devices.filter(d=>d.subnet===s.name&&d.ip).length;
    const cap=cidrCount(s.cidr||"");
    totalUsed+=used;
    totalCap+=cap;
    if(cap&&used/cap>0.85)fullCount++;
  });
  document.getElementById("k-used").textContent=totalUsed;
  document.getElementById("k-used-sub").textContent=totalCap?`من ${totalCap}`:"—";
  document.getElementById("k-free").textContent=Math.max(0,totalCap-totalUsed);
  document.getElementById("k-full").textContent=fullCount;

  const wrap=document.getElementById("snGrid");
  if(!subnets.length){
    wrap.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">▦</div>
      <div class="text-lg fw-700 mb-2">لا توجد شبكات فرعية</div>
      <div class="text-2 mb-4">أضف أول شبكة فرعية لتنظيم أجهزتك</div>
      <button class="btn btn-primary" onclick="openAdd()">＋ إضافة شبكة</button>
    </div>`;
    return;
  }
  wrap.innerHTML=subnets.map((s,i)=>{
    const c=s.color||"#06b6d4";
    const snDevs=devices.filter(d=>d.subnet===s.name);
    const used=snDevs.filter(d=>d.ip).length;
    const cap=cidrCount(s.cidr||"");
    const pct=cap?Math.min(Math.round(used/cap*100),100):Math.min(used*4,100);
    const isWarn=pct>85;
    const online=snDevs.filter(d=>d.status==="online").length;
    return `<div class="sn-card" style="--card-color:${c};animation-delay:${i*0.05}s">
      <div class="sn-head">
        <div class="sn-icon">▦</div>
        <div class="sn-info">
          <div class="sn-name">${esc(s.name)}</div>
          <div class="sn-cidr">${esc(s.cidr||"بدون CIDR")}</div>
        </div>
        <div class="sn-actions">
          <button class="action-btn" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer" onclick="editSn('${s.id}')">✏️</button>
          <button class="action-btn" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer" onclick="delSn('${s.id}','${esc(s.name)}')">🗑️</button>
        </div>
      </div>
      <div class="sn-stats">
        <div class="sn-stat">
          <div class="sn-stat-label">الأجهزة</div>
          <div class="sn-stat-val" style="color:${c}">${snDevs.length}</div>
        </div>
        <div class="sn-stat">
          <div class="sn-stat-label">متصل</div>
          <div class="sn-stat-val text-success">${online}</div>
        </div>
      </div>
      <div class="sn-prog">
        <div class="sn-prog-top">
          <span class="text-2">${used} ${cap?`/ ${cap}`:""} IP</span>
          <span class="fw-700" style="color:${isWarn?'var(--danger)':c}">${pct}%</span>
        </div>
        <div class="sn-prog-bar">
          <div class="sn-prog-fill" style="width:${pct}%;background:${isWarn?'var(--danger)':c}"></div>
        </div>
      </div>
      <div class="sn-meta">
        <span>Gateway: <span class="text-mono text-2">${esc(s.gateway||"—")}</span></span>
        <span>DNS: <span class="text-mono text-2">${esc((s.dns||"").split(",")[0]||"—")}</span></span>
      </div>
    </div>`;
  }).join("");
}

window.openAdd=()=>{
  editingId=null;
  document.getElementById("snTitle").textContent="إضافة شبكة فرعية";
  ["f-name","f-cidr","f-gateway","f-dns","f-desc"].forEach(id=>document.getElementById(id).value="");
  document.querySelectorAll(".color-pick").forEach(x=>x.classList.remove("selected"));
  document.querySelector(".color-pick").classList.add("selected");
  selColor=COLORS[0];
  openModal("snModal");
  setTimeout(()=>document.getElementById("f-name").focus(),100);
};

window.editSn=id=>{
  const s=subnets.find(x=>x.id===id);if(!s)return;
  editingId=id;
  document.getElementById("snTitle").textContent="تعديل: "+s.name;
  document.getElementById("f-name").value=s.name||"";
  document.getElementById("f-cidr").value=s.cidr||"";
  document.getElementById("f-gateway").value=s.gateway||"";
  document.getElementById("f-dns").value=s.dns||"";
  document.getElementById("f-desc").value=s.desc||"";
  selColor=s.color||"#06b6d4";
  document.querySelectorAll(".color-pick").forEach(x=>{x.classList.remove("selected");if(x.style.background===selColor||rgbToHex(x.style.background)===selColor)x.classList.add("selected");});
  openModal("snModal");
};

function rgbToHex(rgb){
  const m=rgb.match(/\d+/g);
  if(!m)return rgb;
  return "#"+m.slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,"0")).join("");
}

window.saveSubnet=async()=>{
  const name=document.getElementById("f-name").value.trim();
  if(!name){toast("اسم الشبكة مطلوب","error");return;}
  const dup=subnets.find(s=>s.name===name&&s.id!==editingId);
  if(dup){toast("يوجد شبكة بنفس الاسم!","error");return;}
  const payload={
    name,
    cidr:document.getElementById("f-cidr").value.trim(),
    gateway:document.getElementById("f-gateway").value.trim(),
    dns:document.getElementById("f-dns").value.trim(),
    desc:document.getElementById("f-desc").value.trim(),
    color:selColor,
  };
  try{
    if(editingId){
      await updateDoc(doc(db,"subnets",editingId),{...payload,updatedAt:serverTimestamp()});
      toast("تم التحديث ✓","success");
    } else {
      await addDoc(collection(db,"subnets"),{...payload,createdAt:serverTimestamp()});
      toast("تمت الإضافة ✓","success");
    }
    closeModal("snModal");
  }catch(e){toast("خطأ: "+e.message,"error");}
};

window.delSn=async(id,name)=>{
  const ok=await confirmDialog(`حذف "${name}" نهائياً؟`,true);
  if(!ok)return;
  await deleteDoc(doc(db,"subnets",id));
  toast("تم الحذف ✓","success");
};

window.closeM=closeModal;
</script>
</body>
</html>
